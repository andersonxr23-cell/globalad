<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Budget & Launch</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(145deg, #dbeafe, #eff6ff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #ffffff;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            color: #1e3a8a;
            margin-top: 0;
            font-size: 24px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }
        .info-box {
            background-color: #f8fafc;
            border-left: 4px solid #3b82f6;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        .info-box p {
            margin: 5px 0;
            font-size: 14px;
            color: #475569;
            word-break: break-all;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #1e293b;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus {
            border-color: #3b82f6;
            outline: none;
        }
        .result-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            text-align: center;
        }
        .result-box h3 {
            margin: 0;
            color: #166534;
            font-size: 18px;
        }
        #total_price {
            font-size: 24px;
            font-weight: bold;
            color: #15803d;
        }
        .btn-launch {
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s;
            display: none; /* শুরুতে বাটনটি লুকানো থাকবে */
        }
        .btn-launch:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>ক্যাম্পেইন বাজেট ও লঞ্চ</h2>
    
    <div class="info-box">
        <p><strong>Ad Title:</strong> {{ title }}</p>
        <p><strong>Ad Link:</strong> {{ link }}</p>
    </div>

    <form action="/createad" method="POST">
        <input type="hidden" name="final_title" value="{{ title }}">
        <input type="hidden" name="final_link" value="{{ link }}">

        <div class="form-group">
            <label for="clicks">কত ক্লিক প্রয়োজন?</label>
            <input type="number" id="clicks" name="clicks" placeholder="যেমন: 1000" oninput="calculatePrice()" min="1" required>
        </div>

        <div class="result-box">
            <h3>মোট খরচ: <span id="total_price">0.00</span> টাকা</h3>
        </div>

        <button type="submit" id="launch_btn" class="btn-launch">Launched Ad Campaign</button>
    </form>
</div>

<script>
    function calculatePrice() {
        let clicks = document.getElementById('clicks').value;
        let launchBtn = document.getElementById('launch_btn');
        let ratePerClick = 0.50; // প্রতি ক্লিকে ৫০ পয়সা (আপনার ইচ্ছা মতো রেট বদলাতে পারেন)
        
        if (clicks > 0) {
            let total = clicks * ratePerClick;
            document.getElementById('total_price').innerText = total.toFixed(2);
            launchBtn.style.display = "block"; // বাটন দেখাবে
        } else {
            document.getElementById('total_price').innerText = "0.00";
            launchBtn.style.display = "none"; // বাটন লুকিয়ে যাবে
        }
    }
</script>

</body>
</html>
